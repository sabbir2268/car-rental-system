services:
  - type: web
    name: car-rental-system
    env: node
    rootDir: .
    buildCommand: npm install && cd client && npm install && npm run build
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        fromService:
          name: car-rental-system
          type: web
          property: host
